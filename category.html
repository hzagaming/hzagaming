<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分类作品集 | HZA Portfolio</title>
    <meta
      name="description"
      content="HZA Gaming 黑白风分类页，展示各软件方向下的作品文章概览。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script>
      (function () {
        var t = setTimeout(function () {
          var loader = document.querySelector('[data-role="page-loader"]');
          if (loader) {
            loader.classList.add("is-hidden");
            setTimeout(function () {
              loader.style.display = "none";
            }, 500);
          }
        }, 8000);
        window.__hideLoaderTimeout = t;
      })();
    </script>
  </head>
  <body data-page="category">
    <div class="page-loader" data-role="page-loader" aria-hidden="true">
      <div class="page-loader__spinner"></div>
    </div>

    <div class="scroll-progress" data-role="scroll-progress" aria-hidden="true"></div>

    <div class="background-orb orb-a"></div>
    <div class="background-orb orb-b"></div>
    <div class="background-grid"></div>

    <div class="site-shell">
      <header class="topbar">
        <a class="brand-mark" href="index.html">
          <span class="brand-mark__kicker">HZA GAMING</span>
          <span class="brand-mark__title">Personal Website</span>
        </a>
        <div class="topbar__meta">
          <span class="version-badge" data-role="version-badge"></span>
          <nav class="topbar__nav">
            <a href="index.html">返回首页</a>
          </nav>
        </div>
      </header>

      <main data-role="category-root"></main>

      <footer class="footer panel">
        <p data-role="footer-version"></p>
        <p>分类页展示当前软件方向下的作品文章。</p>
      </footer>
    </div>

    <button class="back-to-top" data-role="back-to-top" aria-label="回到顶部" title="回到顶部">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <div class="audio-panel" data-role="audio-panel" role="group" aria-label="音频控制">
      <button data-role="audio-sfx-toggle" aria-pressed="true" title="切换音效">音效：开</button>
      <button data-role="audio-bgm-toggle" aria-pressed="false" title="切换背景音乐">BGM：关</button>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
